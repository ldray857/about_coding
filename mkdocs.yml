# 1. 基本信息
site_name: GIS & CS | CodingNote
site_description: 一份关于GIS、CS 与 AI 的记录
site_author: Lucas
site_url: https://ldra857.github.io/CodingNote/
edit_uri: edit/main/docs/

# 2. 仓库链接（右上角会显示 GitHub 图标）
repo_name: CodingNote
repo_url: https://github.com/ldray857/CodingNote

# 3. 主题配置
theme:
  name: material
  language: zh
  favicon: assets/favicon.png # 如果有图标可以放在这里
  logo: assets/logo.png
  palette: 
    # 自动切换深/浅模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo # 浙大蓝风格
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换至深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换至浅色模式
  features:
    - navigation.tabs           # 顶部一级分类
    - navigation.sections       # 侧边栏分组
    - navigation.expand         # 默认展开
    - navigation.top            # 回到顶部按钮
    - search.suggest            # 搜索建议
    - search.highlight          # 搜索关键词高亮
    - content.code.copy         # 代码块一键复制
extra_css:
  - stylesheets/extra.css

# 4. 导航栏配置（精准匹配你的目录结构）
nav:
  - 🏠 首页: index.md
  
  - 🛠️ 工具使用与配置:
      - 工具概览: tools/index.md
      - IDE 相关配置: tools/as_IDE/index.md
      - CS 巨头与编译器: tools/as_cmp/index.md
      
  - 🖥️ 计算机使用感悟:
      - 经验总结: CS/index.md
      
  - ⚡ AI 工程:
      - 实践心得: AI/index.md # 建议后续新建 docs/AI_Eng/index.md
      
  - 💻 C & C++ 工程实践:
      - 核心指南: c_cpp/index.md
      - 环境联动: tools/as_IDE/VS3/index.md
      
  - 🐍 Python 工程实践:
      - 环境管理: python/index.md
      
  - 🌍 GIS 算法与实践:
      - 空间分析与自动化: GIS/index.md
      
  - 🌐 Web 开发工程:
      - 开发概览: web_dev/index.md

# 5. Markdown 增强插件（支持公式、警告框、复杂表格）
markdown_extensions:
  - admonition            # 提示框 !!! info
  - pymdownx.details      # 折叠块 ??? note
  - pymdownx.superfences  # 嵌套代码块
  - pymdownx.inlinehilite # 行内代码高亮
  - pymdownx.magiclink    # 自动识别链接
  - pymdownx.arithmatex:  # 数学公式支持 (GIS 学术必备)
      generic: true
  - pymdownx.tasklist:    # 待办事项列表
      custom_checkbox: true
  - tables                # 标准表格
  - toc:
      permalink: true     # 标题右侧锚点

# 6. 额外的 JS/CSS（用于渲染数学公式等）
extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js